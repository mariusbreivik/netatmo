version: 2
before:
  hooks:
    - go mod download
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X github.com/mariusbreivik/netatmo/cmd.Version={{.Version}}
      - -X github.com/mariusbreivik/netatmo/cmd.Commit={{.ShortCommit}}
      - -X github.com/mariusbreivik/netatmo/cmd.BuildDate={{.Date}}
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'